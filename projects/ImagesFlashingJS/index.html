<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Images Flashing Plugin | v1.0</title>

  <link rel="stylesheet" href="flashing_v1.0/flashing.css">
</head>
<style>
  * {
    margin: 0;
    box-sizing: border-box;
  }

  #wrapper {
    height: 100vh;
    overflow: hidden;
  }

  .images-list {
    height: 100vh;
  }

  .custom-image { width: 25%; }

  .custom-image .image-number {
    position: absolute;
    top: 2rem;
    right: 2rem;
    font-size: 1.6rem;
    font-weight: 900;
    font-family: "Montserrat", sans-serif;
    color: #111;
  }
</style>
<body>
  <div id="wrapper">
    <div class="content">

      <!-- define plugin: class 'flashing' & 'flashing-image' -->
      <div data-setting="greyscale" data-speed="2" data-duration="5" class="flashing images-list"> <!-- by default: color | may be: color, greyscale, sepia -->
        <div class="flashing-image custom-image">
          <img src="images/1.jpg" alt="1">
          <div class="image-number">1</div>
        </div>
        <div class="flashing-image custom-image">
          <img src="images/2.jpg" alt="2">
          <div class="image-number">2</div>
        </div>
        <div class="flashing-image custom-image">
          <img src="images/3.jpg" alt="3">
          <div class="image-number">3</div>
        </div>
        <div class="flashing-image custom-image">
          <img src="images/4.jpg" alt="4">
          <div class="image-number">4</div>
        </div>
        <div class="flashing-image custom-image">
          <img src="images/5.jpg" alt="5">
          <div class="image-number">5</div>
        </div>
        <div class="flashing-image custom-image">
          <img src="images/6.jpg" alt="6">
          <div class="image-number">6</div>
        </div>
        <div class="flashing-image custom-image">
          <img src="images/7.jpg" alt="7">
          <div class="image-number">7</div>
        </div>
      </div>

    </div>
  </div>

  <script src="flashing_v1.0/execute.js" type="text/javascript"></script>
</body>
</html>
