<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Parallax Plugin</title>

  <!-- parallax 2.0.0 style connecting -->
  <link rel="stylesheet" href="parallax_2.0.0/parallax.css">
  <style>
    * { margin: 0; }

    #content {
      min-height: 500vh;
      overflow-x: hidden;
    }

    .images-list {
      margin: 18rem 10rem;
      margin-bottom: 24rem;
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -ms-flex-wrap: wrap;
          flex-wrap: wrap;
      -webkit-box-pack: justify;
          -ms-flex-pack: justify;
              justify-content: space-between;
    }

    .content-image {
      width: 32%;
      height: 20vw;
    }

    .content-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div id="content">
    <div class="images-list">
      <div max="50" speed="-2" class="parallax p-vertical content-image">
        <img src="images/01.jpg" alt="01">
      </div>
      <div max="120" speed="11" class="parallax p-vertical content-image">
        <img src="images/02.jpg" alt="02">
      </div>
      <div max="90" speed="7" class="parallax p-vertical content-image">
        <img src="images/03.jpg" alt="03">
      </div>
    </div>

    <div class="images-list">
      <div max="30" speed="-2" class="parallax p-horizontal content-image">
        <img src="images/04.jpg" alt="04">
      </div>
      <div max="100" speed="2" class="parallax p-horizontal content-image">
        <img src="images/05.jpg" alt="05">
      </div>
      <div max="150" speed="3" class="parallax p-horizontal content-image">
        <img src="images/06.jpg" alt="06">
      </div>
    </div>

    <div class="images-list">
      <div max="150" speed="13" class="parallax p-vertical content-image">
        <img src="images/07.jpg" alt="07">
      </div>
      <div max="60" speed="-2" class="parallax p-vertical content-image">
        <img src="images/08.jpg" alt="08">
      </div>
      <div max="200" speed="9" class="parallax p-vertical content-image">
        <img src="images/09.jpg" alt="09">
      </div>
    </div>

    <div class="images-list">
      <div max="100" speed="2" class="parallax p-horizontal content-image">
        <img src="images/10.jpg" alt="10">
      </div>
      <div max="50" speed="3" class="parallax p-horizontal content-image">
        <img src="images/11.jpg" alt="11">
      </div>
      <div max="150" speed="5" class="parallax p-horizontal content-image">
        <img src="images/12.jpg" alt="12">
      </div>
    </div>

    <div class="images-list">
      <div max="100" speed="-4" class="parallax p-horizontal content-image">
        <img src="images/13.jpg" alt="13">
      </div>
      <div max="150" speed="-3" class="parallax p-horizontal content-image">
        <img src="images/14.jpg" alt="14">
      </div>
      <div max="200" speed="-2" class="parallax p-horizontal content-image">
        <img src="images/15.jpg" alt="15">
      </div>
    </div>

    <div class="images-list">
      <div speed="2" class="parallax p-mousemove content-image">
        <img src="images/02.jpg" alt="02">
      </div>
      <div speed="1" class="parallax p-mousemove content-image">
        <img src="images/13.jpg" alt="13">
      </div>
      <div speed="3" class="parallax p-mousemove content-image">
        <img src="images/06.jpg" alt="06">
      </div>
    </div>

    <div class="images-list">
      <div max="150" speed="-2" class="parallax p-vertical content-image">
        <img src="images/11.jpg" alt="11">
      </div>
      <div max="60" speed="-5" class="parallax p-vertical content-image">
        <img src="images/08.jpg" alt="08">
      </div>
      <div max="200" speed="4" class="parallax p-vertical content-image">
        <img src="images/09.jpg" alt="09">
      </div>
    </div>

    <div class="images-list">
      <div speed="2" class="parallax p-mousemove content-image">
        <img src="images/07.jpg" alt="07">
      </div>
      <div speed="-1" class="parallax p-mousemove content-image">
        <img src="images/15.jpg" alt="15">
      </div>
      <div speed="3" class="parallax p-mousemove content-image">
        <img src="images/01.jpg" alt="1">
      </div>
    </div>
  </div>
</body>

<!-- parallax 1.0.0 connection -->
<script src="parallax_2.0.0/execute.js" type="text/javascript" defer></script>
<script src="parallax_2.0.0/conditions/conditions.js" type="text/javascript"></script>
</html>
